services:
  loki:
    profiles: ["observability"]
    image: grafana/loki:3.6.0
    container_name: galiaf-loki
    restart: unless-stopped
    command: ["-config.file=/etc/loki/loki-config.yaml"]
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ../observability/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki

  vector:
    profiles: ["observability"]
    image: timberio/vector:0.54.0-debian
    container_name: galiaf-vector
    restart: unless-stopped
    depends_on:
      - loki
    command: ["--config", "/etc/vector/vector.yaml"]
    ports:
      - "127.0.0.1:8686:8686"
    volumes:
      - ../observability/vector/vector.yaml:/etc/vector/vector.yaml:ro
      - vector-data:/var/lib/vector
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${OBSERVABILITY_JOURNAL_DIR:-/var/log/journal}:/var/log/journal:ro
      - ${OBSERVABILITY_RUN_JOURNAL_DIR:-/run/log/journal}:/run/log/journal:ro

  public-site:
    image: ghcr.io/${GHCR_NAMESPACE}/galiaf-public-site:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      PORT: 3000
      GALIAF_API_BASE_URL: http://core-api:4000/api/v1
      GALIAF_PUBLIC_SITE_URL: ${GALIAF_PUBLIC_SITE_URL}
      GALIAF_ADMIN_PORTAL_URL: ${GALIAF_ADMIN_PORTAL_URL}
      GALIAF_MANAGER_CABINET_URL: ${GALIAF_MANAGER_CABINET_URL}
      GALIAF_EMPLOYEE_CABINET_URL: ${GALIAF_EMPLOYEE_CABINET_URL}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 10
    depends_on:
      - core-api

  admin-portal:
    image: ghcr.io/${GHCR_NAMESPACE}/galiaf-admin-portal:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      PORT: 3001
      GALIAF_API_BASE_URL: http://core-api:4000/api/v1
      GALIAF_ENABLE_DEV_PERSONAS: ${GALIAF_ENABLE_DEV_PERSONAS:-false}
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/api/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 10
    depends_on:
      - core-api

  manager-cabinet:
    image: ghcr.io/${GHCR_NAMESPACE}/galiaf-manager-cabinet:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      PORT: 3002
      GALIAF_API_BASE_URL: http://core-api:4000/api/v1
      GALIAF_CHAT_BASE_URL: http://chat:4010
      GALIAF_ENABLE_DEV_PERSONAS: ${GALIAF_ENABLE_DEV_PERSONAS:-false}
    ports:
      - "3002:3002"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3002/api/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 10
    depends_on:
      - core-api
      - chat

  employee-cabinet:
    image: ghcr.io/${GHCR_NAMESPACE}/galiaf-employee-cabinet:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      PORT: 3003
      GALIAF_API_BASE_URL: http://core-api:4000/api/v1
      GALIAF_CHAT_BASE_URL: http://chat:4010
      GALIAF_ENABLE_DEV_PERSONAS: ${GALIAF_ENABLE_DEV_PERSONAS:-false}
    ports:
      - "3003:3003"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3003/api/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 10
    depends_on:
      - core-api
      - chat

  core-api:
    image: ghcr.io/${GHCR_NAMESPACE}/galiaf-core-api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      PORT: 4000
      AUTH_MODE: ${AUTH_MODE:-oidc}
      AUTH_DEV_BYPASS_ENABLED: ${AUTH_DEV_BYPASS_ENABLED:-false}
      AUTH_UNSAFE_ALLOW_DEV_BYPASS: ${AUTH_UNSAFE_ALLOW_DEV_BYPASS:-false}
      AUTH_ISSUER_URL: ${AUTH_ISSUER_URL}
      AUTH_AUDIENCE: ${AUTH_AUDIENCE:-galiaf-core-api}
      AUTH_JWKS_URI: ${AUTH_JWKS_URI}
      AUTH_ALLOWED_CORS_ORIGINS: ${AUTH_ALLOWED_CORS_ORIGINS}
      AUTH_ADMIN_WEB_CLIENT_ID: ${AUTH_ADMIN_WEB_CLIENT_ID:-galiaf-admin-portal}
      AUTH_MANAGER_WEB_CLIENT_ID: ${AUTH_MANAGER_WEB_CLIENT_ID:-galiaf-manager-cabinet}
      AUTH_EMPLOYEE_WEB_CLIENT_ID: ${AUTH_EMPLOYEE_WEB_CLIENT_ID:-galiaf-employee-cabinet}
      AUTH_MOBILE_CLIENT_ID: ${AUTH_MOBILE_CLIENT_ID:-galiaf-mobile-app}
      DATABASE_HOST: ${DATABASE_HOST:-postgres}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_NAME: ${DATABASE_NAME:-galiaf}
      DATABASE_USER: ${DATABASE_USER:-galiaf}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      REDIS_URL: ${REDIS_URL}
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4000/api/v1/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 10
    depends_on:
      - postgres
      - redis

  chat:
    image: ghcr.io/${GHCR_NAMESPACE}/galiaf-chat:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      PORT: 4010
      AUTH_MODE: ${AUTH_MODE:-oidc}
      AUTH_DEV_BYPASS_ENABLED: ${AUTH_DEV_BYPASS_ENABLED:-false}
      AUTH_UNSAFE_ALLOW_DEV_BYPASS: ${AUTH_UNSAFE_ALLOW_DEV_BYPASS:-false}
      AUTH_ISSUER_URL: ${AUTH_ISSUER_URL}
      AUTH_AUDIENCE: ${CHAT_AUTH_AUDIENCE:-galiaf-chat-service}
      AUTH_JWKS_URI: ${AUTH_JWKS_URI}
      AUTH_ALLOWED_CORS_ORIGINS: ${AUTH_ALLOWED_CORS_ORIGINS}
      AUTH_ADMIN_WEB_CLIENT_ID: ${AUTH_ADMIN_WEB_CLIENT_ID:-galiaf-admin-portal}
      AUTH_MANAGER_WEB_CLIENT_ID: ${AUTH_MANAGER_WEB_CLIENT_ID:-galiaf-manager-cabinet}
      AUTH_EMPLOYEE_WEB_CLIENT_ID: ${AUTH_EMPLOYEE_WEB_CLIENT_ID:-galiaf-employee-cabinet}
      AUTH_MOBILE_CLIENT_ID: ${AUTH_MOBILE_CLIENT_ID:-galiaf-mobile-app}
      DATABASE_HOST: ${DATABASE_HOST:-postgres}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_USER: ${DATABASE_USER:-galiaf}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      CHAT_DATABASE_HOST: ${CHAT_DATABASE_HOST:-postgres}
      CHAT_DATABASE_PORT: ${CHAT_DATABASE_PORT:-5432}
      CHAT_DATABASE_NAME: ${CHAT_DATABASE_NAME:-galiaf_chat}
      CHAT_DATABASE_ADMIN_NAME: ${CHAT_DATABASE_ADMIN_NAME:-postgres}
      CHAT_DATABASE_USER: ${CHAT_DATABASE_USER:-galiaf}
      CHAT_DATABASE_PASSWORD: ${CHAT_DATABASE_PASSWORD}
      REDIS_URL: ${REDIS_URL}
    ports:
      - "4010:4010"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4010/api/v1/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 10
    depends_on:
      - redis
      - postgres

  postgres:
    image: postgres:17.6-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-galiaf}
      POSTGRES_USER: ${POSTGRES_USER:-galiaf}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-galiaf}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:8.2.1-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres-data:
  loki-data:
  vector-data:
