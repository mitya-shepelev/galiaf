name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  smoke:
    runs-on: ubuntu-latest
    needs: validate

    services:
      postgres:
        image: postgres:17.6-alpine
        env:
          POSTGRES_DB: galiaf
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d galiaf"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:8.2.1-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      AUTH_MODE: dev
      AUTH_DEV_BYPASS_ENABLED: "true"
      AUTH_ALLOWED_CORS_ORIGINS: http://127.0.0.1:3000,http://127.0.0.1:3001,http://127.0.0.1:3002,http://127.0.0.1:3003
      DATABASE_HOST: 127.0.0.1
      DATABASE_PORT: "5432"
      DATABASE_NAME: galiaf
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      REDIS_URL: redis://127.0.0.1:6379
      CHAT_DATABASE_HOST: 127.0.0.1
      CHAT_DATABASE_PORT: "5432"
      CHAT_DATABASE_NAME: galiaf_chat
      CHAT_DATABASE_ADMIN_NAME: postgres
      CHAT_DATABASE_USER: postgres
      CHAT_DATABASE_PASSWORD: postgres
      CHAT_SERVICE_HTTP_URL: http://127.0.0.1:4010
      CHAT_SERVICE_URL: http://127.0.0.1:4010/chat
      GALIAF_API_BASE_URL: http://127.0.0.1:4000/api/v1
      GALIAF_CHAT_BASE_URL: http://127.0.0.1:4010
      GALIAF_ENABLE_DEV_PERSONAS: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build smoke targets
        run: |
          pnpm --filter @galiaf/sdk build
          pnpm --filter @galiaf/core-api build
          pnpm --filter @galiaf/chat-service build
          pnpm --filter @galiaf/web-admin-portal build
          pnpm --filter @galiaf/web-manager-cabinet build
          pnpm --filter @galiaf/web-employee-cabinet build

      - name: Start smoke services
        run: |
          node apps/api/core-api/dist/main.js > /tmp/core-api.log 2>&1 &
          echo $! > /tmp/core-api.pid

          node services/chat/dist/main.js > /tmp/chat-service.log 2>&1 &
          echo $! > /tmp/chat-service.pid

          PORT=3001 node apps/web/admin-portal/.next/standalone/apps/web/admin-portal/server.js > /tmp/admin-portal.log 2>&1 &
          echo $! > /tmp/admin-portal.pid

          PORT=3002 node apps/web/manager-cabinet/.next/standalone/apps/web/manager-cabinet/server.js > /tmp/manager-cabinet.log 2>&1 &
          echo $! > /tmp/manager-cabinet.pid

          PORT=3003 node apps/web/employee-cabinet/.next/standalone/apps/web/employee-cabinet/server.js > /tmp/employee-cabinet.log 2>&1 &
          echo $! > /tmp/employee-cabinet.pid

      - name: Wait for smoke services
        run: |
          until curl --fail --silent http://127.0.0.1:4000/api/v1/health > /dev/null; do sleep 1; done
          until curl --fail --silent http://127.0.0.1:4010/api/v1/health > /dev/null; do sleep 1; done
          until curl --fail --silent http://127.0.0.1:3001 > /dev/null; do sleep 1; done
          until curl --fail --silent http://127.0.0.1:3002 > /dev/null; do sleep 1; done
          until curl --fail --silent http://127.0.0.1:3003 > /dev/null; do sleep 1; done

      - name: Core API smoke
        run: pnpm core-api:manager:smoke

      - name: Chat smoke
        run: pnpm chat:smoke

      - name: Web cabinets smoke
        run: pnpm web:smoke

      - name: Dump service logs on failure
        if: failure()
        run: |
          for log in \
            /tmp/core-api.log \
            /tmp/chat-service.log \
            /tmp/admin-portal.log \
            /tmp/manager-cabinet.log \
            /tmp/employee-cabinet.log; do
            echo "::group::$(basename "$log")"
            cat "$log" || true
            echo "::endgroup::"
          done

      - name: Stop smoke services
        if: always()
        run: |
          for pid_file in \
            /tmp/core-api.pid \
            /tmp/chat-service.pid \
            /tmp/admin-portal.pid \
            /tmp/manager-cabinet.pid \
            /tmp/employee-cabinet.pid; do
            if [ -f "$pid_file" ]; then
              kill "$(cat "$pid_file")" || true
            fi
          done
