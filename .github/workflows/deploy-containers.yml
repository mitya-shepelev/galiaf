name: Deploy Containers

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  contents: read
  packages: write

jobs:
  publish-images:
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: public-site
            context: .
            dockerfile: apps/web/public-site/Dockerfile
          - service: admin-portal
            context: .
            dockerfile: apps/web/admin-portal/Dockerfile
          - service: manager-cabinet
            context: .
            dockerfile: apps/web/manager-cabinet/Dockerfile
          - service: employee-cabinet
            context: .
            dockerfile: apps/web/employee-cabinet/Dockerfile
          - service: core-api
            context: .
            dockerfile: apps/api/core-api/Dockerfile
          - service: chat
            context: .
            dockerfile: services/chat/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Resolve image tag namespace
        id: image
        env:
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          SERVICE_NAME: ${{ matrix.service }}
        run: |
          owner_lc="${REPOSITORY_OWNER,,}"
          echo "image=ghcr.io/${owner_lc}/galiaf-${SERVICE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ steps.image.outputs.image }}:${{ github.event.workflow_run.head_sha }}
            ${{ steps.image.outputs.image }}:latest

  call-deploy-webhook:
    runs-on: ubuntu-latest
    needs: publish-images
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      }}

    steps:
      - name: Trigger deploy webhook
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          DEPLOY_WEBHOOK_TOKEN: ${{ secrets.DEPLOY_WEBHOOK_TOKEN }}
        run: |
          if [ -z "$DEPLOY_WEBHOOK_URL" ]; then
            echo "DEPLOY_WEBHOOK_URL is not configured, skipping deploy webhook."
            exit 0
          fi

          curl --fail --show-error --silent \
            -X POST "$DEPLOY_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-Deploy-Token: $DEPLOY_WEBHOOK_TOKEN" \
            -d "{\"sha\":\"${{ github.event.workflow_run.head_sha }}\",\"imageTag\":\"${{ github.event.workflow_run.head_sha }}\",\"ref\":\"${{ github.event.workflow_run.head_branch }}\",\"repository\":\"${{ github.repository }}\"}"
