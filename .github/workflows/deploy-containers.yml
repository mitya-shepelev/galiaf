name: Deploy Containers

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  contents: read
  packages: write

jobs:
  publish-images:
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: public-site
            context: .
            dockerfile: apps/web/public-site/Dockerfile
          - service: admin-portal
            context: .
            dockerfile: apps/web/admin-portal/Dockerfile
          - service: manager-cabinet
            context: .
            dockerfile: apps/web/manager-cabinet/Dockerfile
          - service: employee-cabinet
            context: .
            dockerfile: apps/web/employee-cabinet/Dockerfile
          - service: core-api
            context: .
            dockerfile: apps/api/core-api/Dockerfile
          - service: chat
            context: .
            dockerfile: services/chat/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Resolve image tag namespace
        id: image
        env:
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          SERVICE_NAME: ${{ matrix.service }}
        run: |
          owner_lc="${REPOSITORY_OWNER,,}"
          echo "image=ghcr.io/${owner_lc}/galiaf-${SERVICE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ steps.image.outputs.image }}:${{ github.event.workflow_run.head_sha }}
            ${{ steps.image.outputs.image }}:latest

  trigger-dokploy-deploy:
    runs-on: ubuntu-latest
    needs: publish-images
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      }}

    steps:
      - name: Trigger Dokploy deployments
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_TOKEN: ${{ secrets.DOKPLOY_TOKEN }}
          DOKPLOY_APP_ID_PUBLIC_SITE: ${{ vars.DOKPLOY_APP_ID_PUBLIC_SITE }}
          DOKPLOY_APP_ID_ADMIN_PORTAL: ${{ vars.DOKPLOY_APP_ID_ADMIN_PORTAL }}
          DOKPLOY_APP_ID_MANAGER_CABINET: ${{ vars.DOKPLOY_APP_ID_MANAGER_CABINET }}
          DOKPLOY_APP_ID_EMPLOYEE_CABINET: ${{ vars.DOKPLOY_APP_ID_EMPLOYEE_CABINET }}
          DOKPLOY_APP_ID_CORE_API: ${{ vars.DOKPLOY_APP_ID_CORE_API }}
          DOKPLOY_APP_ID_CHAT: ${{ vars.DOKPLOY_APP_ID_CHAT }}
        run: |
          if [ -z "$DOKPLOY_URL" ] || [ -z "$DOKPLOY_TOKEN" ]; then
            echo "DOKPLOY_URL or DOKPLOY_TOKEN is not configured."
            exit 1
          fi

          deploy_endpoint="${DOKPLOY_URL%/}/application.deploy"

          deploy_app() {
            service_name="$1"
            application_id="$2"

            if [ -z "$application_id" ]; then
              echo "Missing Dokploy application id for ${service_name}."
              exit 1
            fi

            echo "Triggering Dokploy deployment for ${service_name}"

            curl --fail --show-error --silent \
              -X POST "$deploy_endpoint" \
              -H "accept: application/json" \
              -H "Content-Type: application/json" \
              -H "x-api-key: $DOKPLOY_TOKEN" \
              -d "{\"applicationId\":\"${application_id}\"}"

            echo
          }

          deploy_app "public-site" "$DOKPLOY_APP_ID_PUBLIC_SITE"
          deploy_app "admin-portal" "$DOKPLOY_APP_ID_ADMIN_PORTAL"
          deploy_app "manager-cabinet" "$DOKPLOY_APP_ID_MANAGER_CABINET"
          deploy_app "employee-cabinet" "$DOKPLOY_APP_ID_EMPLOYEE_CABINET"
          deploy_app "core-api" "$DOKPLOY_APP_ID_CORE_API"
          deploy_app "chat" "$DOKPLOY_APP_ID_CHAT"
