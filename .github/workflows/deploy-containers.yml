name: Deploy Containers

on:
  push:
    branches:
      - main

jobs:
  publish-images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: public-site
            context: .
            dockerfile: apps/web/public-site/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/galiaf-public-site
          - service: admin-portal
            context: .
            dockerfile: apps/web/admin-portal/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/galiaf-admin-portal
          - service: manager-cabinet
            context: .
            dockerfile: apps/web/manager-cabinet/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/galiaf-manager-cabinet
          - service: employee-cabinet
            context: .
            dockerfile: apps/web/employee-cabinet/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/galiaf-employee-cabinet
          - service: core-api
            context: .
            dockerfile: apps/api/core-api/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/galiaf-core-api
          - service: chat
            context: .
            dockerfile: services/chat/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/galiaf-chat

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ matrix.image }}:${{ github.sha }}
            ${{ matrix.image }}:latest

  call-deploy-webhook:
    runs-on: ubuntu-latest
    needs: publish-images
    if: ${{ secrets.DEPLOY_WEBHOOK_URL != '' }}

    steps:
      - name: Trigger deploy webhook
        run: |
          curl --fail --show-error --silent \
            -X POST "${{ secrets.DEPLOY_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -H "X-Deploy-Token: ${{ secrets.DEPLOY_WEBHOOK_TOKEN }}" \
            -d "{\"sha\":\"${{ github.sha }}\",\"ref\":\"${{ github.ref_name }}\",\"repository\":\"${{ github.repository }}\"}"
